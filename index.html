<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        /* --- CSS STYLE START --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1e38);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .player-container {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 320px;
            text-align: center;
            color: #f8fafc;
        }
        .track-art {
            width: 200px;
            height: 200px;
            background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=400');
            background-size: cover;
            background-position: center;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .track-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .track-artist {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .seek-slider {
            width: 70%;
            accent-color: #38bdf8;
            cursor: pointer;
        }
        .time {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }
        .btn {
            background: none;
            border: none;
            color: #f8fafc;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .btn:hover {
            color: #38bdf8;
            transform: scale(1.1);
        }
        .playpause-btn {
            font-size: 2.5rem;
            color: #38bdf8;
        }
        /* --- CSS STYLE END --- */
    </style>
</head>
<body>

    <div class="player-container">
        <div class="track-art"></div>
        <div class="track-name" id="title">Cinematic Ambient</div>
        <div class="track-artist" id="artist">No Copyright Track</div>

        <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

        <div class="progress-container">
            <span class="time" id="current-time">0:00</span>
            <input type="range" min="0" max="100" value="0" class="seek-slider" id="seek-slider" onchange="seekTo()">
            <span class="time" id="duration">0:00</span>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevTrack()">⏮</button>
            <button class="btn playpause-btn" id="playpause" onclick="togglePlay()">▶</button>
            <button class="btn" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT START --- */
        const audio = document.getElementById('audio');
        const playpauseBtn = document.getElementById('playpause');
        const seekSlider = document.getElementById('seek-slider');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');

        let isPlaying = false;

        function togglePlay() {
            if (!isPlaying) {
                audio.play();
                isPlaying = true;
                playpauseBtn.innerText = '⏸';
            } else {
                audio.pause();
                isPlaying = false;
                playpauseBtn.innerText = '▶';
            }
        }

        
        audio.addEventListener('timeupdate', () => {
            const position = audio.currentTime / audio.duration;
            seekSlider.value = position * 100 || 0;
            
            
            let currentMins = Math.floor(audio.currentTime / 60);
            let currentSecs = Math.floor(audio.currentTime % 60);
            if(currentSecs < 10) currentSecs = '0' + currentSecs;
            currentTimeDisplay.innerText = `${currentMins}:${currentSecs}`;
        });

        
        audio.addEventListener('loadedmetadata', () => {
            let durationMins = Math.floor(audio.duration / 60);
            let durationSecs = Math.floor(audio.duration % 60);
            if(durationSecs < 10) durationSecs = '0' + durationSecs;
            durationDisplay.innerText = `${durationMins}:${durationSecs}`;
        });

        function seekTo() {
            const seekto = audio.duration * (seekSlider.value / 100);
            audio.currentTime = seekto;
        }

        
        function nextTrack() {
            alert("Next track triggered! (Playlist feature can be added here)");
        }
        function prevTrack() {
            alert("Previous track triggered!");
        }
        
    </script>
</body>
</html>
